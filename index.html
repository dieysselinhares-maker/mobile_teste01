<!DOCTYPE html>
<html>
<head>
    <title>App de Média</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            margin: 5px;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Calculadora de Média</h1>

    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <br><br>

    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado"></h2>

    <script>
        function calcular() {
            let n1 = Number(document.getElementById("nota1").value);
            let n2 = Number(document.getElementById("nota2").value);

            let media = (n1 + n2) / 2;

            if(media >= 6){
                document.getElementById("resultado").innerText = "Aprovado 😄 Média: " + media;
            } else {
                document.getElementById("resultado").innerText = "Reprovado 😢 Média: " + media;
            }
        }
    </script>

</body>
</html>
